version: '3.8'

services:
  neurolvault-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: neurolvault-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ../data:/app/data
      - ../ml_engine:/app/ml_engine
      - ../rag_system:/app/rag_system
      - ../agents:/app/agents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/predictions/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped